<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" class="width: 100%;" type="image/png" href="/favicon.png" />
    <title>QSTECH | Gestão de Processos SEDUR</title>
    <meta name="description" content="Plataforma de gestão e monitoramento de processos ambientais da SEDUR" />
    
    <style>
      /* 🔥 SPLASH SCREEN COM LOGO GRANDE 🔥 */
      .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1e8449 0%, #166534 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .splash-logo {
        width: 200px;
        max-width: 80%;
        animation: pulse 1.5s ease-in-out infinite, fadeInUp 0.8s ease-out;
      }
      
      .splash-text {
        margin-top: 2rem;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      
      .splash-title {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: 2px;
        margin-bottom: 0.5rem;
      }
      
      .splash-subtitle {
        font-size: 0.875rem;
        opacity: 0.8;
      }
      
      .splash-loader {
        margin-top: 2rem;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Esconde o splash quando o React carregar */
      .splash-screen.hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <!-- 🔥 SPLASH SCREEN COM LOGO GRANDE 🔥 -->
    <div id="splash" class="splash-screen">
      <img 
        src="/logo-qstech-nome-qstech-consultoria&gestao-ambientalverde.png" 
        alt="QSTech" 
        class="splash-logo"
      />
      <div class="splash-text">
        <div class="splash-title">QSTech</div>
        <div class="splash-subtitle">Gestão de Processos SEDUR</div>
      </div>
      <div class="splash-loader"></div>
    </div>

    <div id="root"></div>
    
    <script>
      // Remove o splash screen quando o React estiver pronto
      window.addEventListener('load', function() {
        setTimeout(function() {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hide');
            setTimeout(function() {
              splash.style.display = 'none';
            }, 500);
          }
        }, 500);
      });
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
